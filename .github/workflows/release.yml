name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: make validate

      - name: Run tests
        run: make test

      - name: Build and package
        run: make package

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign Firefox extension
        if: vars.AMO_JWT_ISSUER != ''
        env:
          AMO_JWT_ISSUER: ${{ vars.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          echo "Signing Firefox extension..."
          make sign-firefox-listed || echo "::warning::Firefox signing failed - continuing with unsigned package"

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "changes<<EOF"
            echo "${CHANGES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find release artefacts
        id: find_artefacts
        run: |
          # Find all .xpi and .zip files in dist/
          FILES=$(find dist -type f \( -name "*.xpi" -o -name "*.zip" \) | tr '\n' ',' | sed 's/,$//')
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          body: |
            ## Changes
            ${{ steps.release_notes.outputs.changes }}

            ## Installation

            ### Firefox
            - **From AMO**: Visit [addons.mozilla.org](https://addons.mozilla.org/firefox/addon/goodlinks-ng/) (if listed)
            - **Manual**: Download `goodlinks-ng-${{ steps.get_version.outputs.version }}-firefox.xpi`

            ### Chrome/Brave/Edge
            Download `goodlinks-ng-${{ steps.get_version.outputs.version }}-chrome.zip` and load as unpacked extension

            ## Checksums
            ```
            $(cd dist && sha256sum * 2>/dev/null || true)
            ```
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
