name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write
  pull-requests: read

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: make validate

      - name: Run tests
        run: make test

      - name: Build extension
        run: make build

      - name: Package extension
        run: make package

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: dist/*
          retention-days: 7

  release:
    name: Create Release
    needs: lint-test-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
      AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: make package

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign Firefox extension
        if: env.AMO_JWT_ISSUER != ''
        run: |
          echo "Signing Firefox extension..."
          make sign-firefox-listed || echo "::warning::Firefox signing failed - continuing with unsigned package"

      - name: Publish to Chrome Web Store
        if: vars.CHROME_EXTENSION_ID != ''
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          CHROME_EXTENSION_ID: ${{ vars.CHROME_EXTENSION_ID }}
        run: |
          echo "Publishing Chrome extension..."
          make publish-chrome || echo "::warning::Chrome Web Store publishing failed - continuing with package only"

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "changes<<EOF"
            echo "${CHANGES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          body: |
            ## Changes
            ${{ steps.release_notes.outputs.changes }}

            ## Installation

            ### Firefox
            - **From AMO**: Visit [addons.mozilla.org](https://addons.mozilla.org/firefox/addon/goodlinks-ng/)
            - **Manual**: Download `goodlinks-ng-${{ steps.get_version.outputs.version }}-firefox.xpi`

            ### Chrome/Brave
            Download `goodlinks-ng-${{ steps.get_version.outputs.version }}-chrome.zip` and load as unpacked extension

            ## Checksums
            ```
            $(cd dist && sha256sum * 2>/dev/null || true)
            ```
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
